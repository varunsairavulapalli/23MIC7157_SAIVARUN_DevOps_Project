apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-event-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: college-event-website

  template:
    metadata:
      labels:
        app: college-event-website

    spec:
      containers:
      - name: college-event-website
        image: college-event-website:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086